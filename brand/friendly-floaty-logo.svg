<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" fill="none" role="img" aria-label="Friendly Floaty">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD84D"/>
      <stop offset="1" stop-color="#F5B800"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39B6EC"/>
      <stop offset="1" stop-color="#1E86C7"/>
    </linearGradient>
  </defs>

  <!-- MARK -->
  <g transform="translate(100 104)">
    <!-- signal arcs -->
    <g stroke="#F5B800" stroke-width="4.5" stroke-linecap="round" fill="none" opacity=".9">
      <path d="M22 -74 a20 20 0 0 1 16 8"/>
      <path d="M30 -82 a34 34 0 0 1 26 13"/>
    </g>
    <!-- antenna -->
    <line x1="0" y1="-58" x2="8" y2="-86" stroke="#12233A" stroke-width="5" stroke-linecap="round"/>
    <circle cx="9" cy="-88" r="7" fill="#F5B800" stroke="#12233A" stroke-width="3"/>
    <!-- buoy body -->
    <path d="M-60 6
             C-60 -40 -34 -62 0 -62
             C34 -62 60 -40 60 6
             C60 34 34 52 0 52
             C-34 52 -60 34 -60 6 Z" fill="url(#body)" stroke="#12233A" stroke-width="6"/>
    <!-- buoy band -->
    <path d="M-58 20 C-38 30 38 30 58 20 L58 34 C38 44 -38 44 -58 34 Z" fill="#E9A400" opacity=".55"/>
    <!-- eyes -->
    <g>
      <ellipse cx="-19" cy="-8" rx="13" ry="15" fill="#fff" stroke="#12233A" stroke-width="4"/>
      <ellipse cx="19" cy="-8" rx="13" ry="15" fill="#fff" stroke="#12233A" stroke-width="4"/>
      <circle cx="-15" cy="-5" r="5.5" fill="#12233A"/>
      <circle cx="23" cy="-5" r="5.5" fill="#12233A"/>
      <circle cx="-17" cy="-8" r="1.8" fill="#fff"/>
      <circle cx="21" cy="-8" r="1.8" fill="#fff"/>
    </g>
    <!-- smile -->
    <path d="M-14 20 Q0 32 14 20" stroke="#12233A" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- waterline waves -->
    <g fill="url(#wave)">
      <path d="M-78 40 q10 -12 20 0 t20 0 t20 0 t20 0 t20 0 t20 0 t20 0 l0 20 q-10 12 -20 0 t-20 0 t-20 0 t-20 0 t-20 0 t-20 0 t-20 0 Z" opacity=".9"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(198 0)" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
    <text x="0" y="98" font-size="52" font-weight="800" letter-spacing="-1">
      <tspan fill="#8AA0B8">Friendly </tspan><tspan fill="#F5B800">Floaty</tspan>
    </text>
    <text x="2" y="132" font-size="19.5" font-weight="600" letter-spacing=".5" fill="#7C8CA3">open-source river-litter drift trackers</text>
    <text x="2" y="158" font-size="14.5" font-weight="600" letter-spacing="1.5" fill="#B0B9C6">사단법인 이타서울 · GAA</text>
  </g>
</svg>
